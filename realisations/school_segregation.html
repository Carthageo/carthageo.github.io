<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte Leaflet</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@observablehq/inspector@5/dist/inspector.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { overflow: hidden; }

    .viewport {
      height: 100svh;
      width: 100%;
      overflow: hidden;
    }

    #observable-root {
      height: 100%;
      width: 100%;
    }

    /* Nettoyage inspector */
    #observable-root .observablehq,
    #observable-root .observablehq--inspect,
    #observable-root .observablehq--inspect > * {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* IMPORTANT Leaflet: il faut une hauteur réelle sur toute la chaîne */
    #observable-root .observablehq--inspect,
    #observable-root .observablehq--inspect > div {
      height: 100% !important;
      width: 100% !important;
    }

    #observable-root .leaflet-container {
      height: 100% !important;
      width: 100% !important;
    }
  </style>
</head>

<body>
  <div class="viewport">
    <div id="observable-root"></div>
  </div>

  <script type="module">
    import { Runtime, Inspector } from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@5/dist/runtime.js";
    import define from "https://api.observablehq.com/d/6f3ddd50b9e27093.js?v=4";

    const target = document.querySelector("#observable-root");

    // Observer silencieux : force l’exécution des cellules sans rien afficher
    const silent = {
      pending() {},
      fulfilled() {},
      rejected(error) { console.error(error); }
    };

    const runtime = new Runtime();
    runtime.module(define, (name) => {
      // On affiche uniquement mapDiv
      if (name === "mapDiv") return new Inspector(target);

      // On exécute tout le reste en silence (pour les couches, légendes, titres ajoutés via side effects)
      return silent;
    });

    // Nudge resize pour que Leaflet calcule correctement sa taille après montage
    const nudge = () => window.dispatchEvent(new Event("resize"));
    setTimeout(nudge, 150);
    setTimeout(nudge, 500);
    setTimeout(nudge, 1200);
    window.addEventListener("resize", nudge);
  </script>
</body>
</html>
