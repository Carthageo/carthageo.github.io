<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte interactive</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@observablehq/inspector@5/dist/inspector.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; width: 100%; }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    .viewport {
      position: relative;
      flex: 1 1 auto;
      overflow: hidden;
      padding: 0;                 /* on laisse le JS gérer l’air */
      display: flex;
      justify-content: center;
      align-items: center;        /* centre aussi en hauteur */
    }

    #stage {
      transform-origin: top left;
      will-change: transform;
    }

    /* --- CSS générique : marche pour n’importe quelle sortie Observable --- */
    .observable-wrap { display: block; }

    .observable-wrap svg {
      height: auto;
      max-width: 100%;
    }

    .observable-wrap .observablehq,
    .observable-wrap .observablehq--inspect,
    .observable-wrap .observablehq--inspect > * {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    footer { display: none; }
  </style>
</head>

<body>
  <div class="page">
    <div class="viewport">
      <div id="stage">
        <!-- 1) Ici : l'ID doit matcher ton embed Observable -->
        <div id="observablehq-carte-3be16b7a" class="observable-wrap"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { Runtime, Inspector } from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@5/dist/runtime.js";

    // 2) Ici : le define du notebook Observable
    import define from "https://api.observablehq.com/d/8281de8b5d295c7e.js?v=4";

    const stage = document.getElementById("stage");

    // 3) Ici : le bon sélecteur du div cible
    const target = document.querySelector("#observablehq-carte-3be16b7a");

    const runtime = new Runtime();
    runtime.module(define, (name) => {
      // 4) Ici : le nom de la cellule à afficher
      if (name === "carte") return new Inspector(target);
    });

    function fitToViewport() {
      stage.style.transform = "none";

      const viewport = document.querySelector(".viewport");
      const safe = 18;

      const availW = viewport.clientWidth - safe * 2;
      const availH = viewport.clientHeight - safe * 2;

      // Mesure plus robuste : rect + scroll (utile si des éléments débordent)
      const rect = stage.getBoundingClientRect();
      const w = Math.max(rect.width, stage.scrollWidth);
      const h = Math.max(rect.height, stage.scrollHeight);
      if (w === 0 || h === 0) return;

      let scale = Math.min(availW / w, availH / h, 1);
      scale = Math.round(scale * 1000) / 1000; // stabilise

      stage.style.transform = `scale(${scale})`;

      const scaledW = w * scale;
      const scaledH = h * scale;

      const left = safe + Math.max(0, (availW - scaledW) / 2);
      const top  = safe + Math.max(0, (availH - scaledH) / 2);

      stage.style.position = "absolute";
      stage.style.left = `${Math.round(left)}px`;
      stage.style.top  = `${Math.round(top)}px`;
    }

    const ro = new ResizeObserver(() => fitToViewport());
    ro.observe(stage);

    window.addEventListener("resize", fitToViewport);
    setTimeout(fitToViewport, 150);
    setTimeout(fitToViewport, 500);
  </script>
</body>
</html>
