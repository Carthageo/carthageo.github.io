<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte interactive</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@observablehq/inspector@5/dist/inspector.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }

    /* Page scrollable (important) */
    body { overflow-y: auto; }

    .page { min-height: 100svh; }

    /* Zone "écran" dédiée à la carte */
    .viewport {
      position: relative;
      height: 100svh;          /* <- fixe : la carte vit dans un écran */
      overflow: hidden;
      padding: 18px 12px 12px; /* air en haut */
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Ce bloc sera "fit" / scale */
    #map-stage { transform-origin: top left; will-change: transform; }

    .layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Zone texte sous la carte : scroll naturel */
    #text-stage {
      padding: 16px 12px 28px;
      max-width: 980px;
      margin: 0 auto;
    }

    /* CSS générique Observable */
    .observable-wrap { display: block; }
    .observable-wrap svg { max-width: 100%; height: auto; display: block; }

    .observable-wrap .observablehq,
    .observable-wrap .observablehq--inspect,
    .observable-wrap .observablehq--inspect > * {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    footer { display: none; }
  </style>
</head>

<body>
  <div class="page">

    <!-- 1) Écran carte (fit + centré) -->
    <div class="viewport">
      <div id="map-stage">
        <div class="layout">
          <div id="obs-titre" class="observable-wrap"></div>
          <div id="obs-setup" class="observable-wrap"></div>
          <!-- si ta cellule "svg" s’affiche ici, elle apparaîtra via le notebook -->
        </div>
      </div>
    </div>

    <!-- 2) Texte sous la carte (hors fit, scroll) -->
    <div id="text-stage">
      <div id="obs-texte" class="observable-wrap"></div>
    </div>

  </div>

  <script type="module">
    import { Runtime, Inspector } from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@5/dist/runtime.js";

    /* ==========
       CONFIG
       ========== */
    const NOTEBOOK = "d965c821496f3c2f";
    const VERSION  = null;      // mets un nombre si tu veux figer un @xxx
    const SCALE_MAX = 0.99;
    const SAFE = 18;

    // Rendu des cellules : texteContainer va dans la zone scrollable
    const DISPLAY = {
      "titre": document.getElementById("obs-titre"),
      "quelque_chose_sinon_sans_ca_ca_marche_pas_mais_je_sais_plus_ce_que_ca_fait": document.getElementById("obs-setup"),
      "texteContainer": document.getElementById("obs-texte")
    };

    // Cellules à exécuter sans afficher
    const EVALUATE_ONLY = new Set(["remplir_texte", "svg"]);

    const mapStage = document.getElementById("map-stage");  // <- uniquement la carte !
    const viewport = document.querySelector(".viewport");

    const defineUrl = VERSION
      ? `https://api.observablehq.com/d/${NOTEBOOK}@${VERSION}.js?v=4`
      : `https://api.observablehq.com/d/${NOTEBOOK}.js?v=4`;

    const { default: define } = await import(defineUrl);

    const runtime = new Runtime();
    runtime.module(define, (name) => {
      if (name in DISPLAY) return new Inspector(DISPLAY[name]);
      if (EVALUATE_ONLY.has(name)) return true;
      return null;
    });

    // Normalise seulement les SVG dans la zone carte
    function normalizeMainSvg() {
      const svgs = mapStage.querySelectorAll("svg");
      if (!svgs.length) return;

      svgs.forEach(s => { s.style.width = ""; s.style.height = ""; });

      let main = null, maxArea = 0;
      svgs.forEach(s => {
        const b = s.getBoundingClientRect();
        const area = b.width * b.height;
        if (area > maxArea) { maxArea = area; main = s; }
      });

      if (main) {
        main.style.width = "100%";
        main.style.height = "auto";
        main.style.display = "block";
      }
    }

    // Fit basé UNIQUEMENT sur la carte (mapStage) -> le texte n'impacte plus le zoom
    function fitToViewport() {
      mapStage.style.transform = "none";

      const availW = viewport.clientWidth - SAFE * 2;
      const availH = viewport.clientHeight - SAFE * 2;

      const rect = mapStage.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;

      const scale = Math.min(availW / rect.width, availH / rect.height, SCALE_MAX);
      mapStage.style.transform = `scale(${scale})`;

      const scaledW = rect.width * scale;
      const scaledH = rect.height * scale;

      const left = SAFE + Math.max(0, (availW - scaledW) / 2);
      const top  = SAFE + Math.max(0, (availH - scaledH) / 2);

      mapStage.style.position = "absolute";
      mapStage.style.left = `${Math.round(left)}px`;
      mapStage.style.top  = `${Math.round(top)}px`;
    }

    // Observe seulement la zone carte (pas le texte)
    const ro = new ResizeObserver(() => {
      normalizeMainSvg();
      fitToViewport();
    });
    ro.observe(mapStage);

    window.addEventListener("resize", () => {
      normalizeMainSvg();
      fitToViewport();
    });

    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 150);
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 500);
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 1200);
  </script>
</body>
</html>
