<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Évolution des Frontières</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@observablehq/inspector@5/dist/inspector.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }

    .page { min-height: 100svh; display: flex; flex-direction: column; }

    .viewport {
      position: relative;
      flex: 1 1 auto;
      overflow: hidden;
      padding: 18px 12px 12px;   /* air en haut */
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #stage { transform-origin: top left; will-change: transform; }

    /* CSS générique : pas dépendant d’un ID Observable */
    .observable-wrap { display: block; }
    .observable-wrap svg { max-width: 100%; height: auto; display: block; }

    .observable-wrap .observablehq,
    .observable-wrap .observablehq--inspect,
    .observable-wrap .observablehq--inspect > * {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    footer { display: none; }
  </style>
</head>

<body>
  <div class="page">
    <div class="viewport">
      <div id="stage">
        <!-- Conteneur STABLE : tu n’as plus à suivre les IDs générés par Observable -->
        <div id="observable-root" class="observable-wrap"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { Runtime, Inspector } from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@5/dist/runtime.js";

    /* ==========
       CONFIG
       ========== */
    const NOTEBOOK = "075cb7457ec1183e";   // d/XXXX
    const VERSION  = null;                 // <-- non figé : s’actualise automatiquement
    const CELL     = "borders_evolution";
    const SCALE_MAX = 0.99;
    const SAFE = 18;

    const stage = document.getElementById("stage");
    const target = document.getElementById("observable-root");

    // Import dynamique du notebook (sans @VERSION si VERSION=null)
    const defineUrl = VERSION
      ? `https://api.observablehq.com/d/${NOTEBOOK}@${VERSION}.js?v=4`
      : `https://api.observablehq.com/d/${NOTEBOOK}.js?v=4`;

    const { default: define } = await import(defineUrl);

    const runtime = new Runtime();
    runtime.module(define, (name) => {
      if (name === CELL) return new Inspector(target);
      return null;
    });

    // Optionnel : si plusieurs SVG existent (légendes, pictos),
    // on applique le "plein largeur" uniquement au SVG principal (le plus grand).
    function normalizeMainSvg() {
      const svgs = target.querySelectorAll("svg");
      if (!svgs.length) return;

      svgs.forEach(s => { s.style.width = ""; s.style.height = ""; });

      let main = null, maxArea = 0;
      svgs.forEach(s => {
        const b = s.getBoundingClientRect();
        const area = b.width * b.height;
        if (area > maxArea) { maxArea = area; main = s; }
      });

      if (main) {
        main.style.width = "100%";
        main.style.height = "auto";
        main.style.display = "block";
      }
    }

    function fitToViewport() {
      stage.style.transform = "none";

      const viewport = document.querySelector(".viewport");
      const availW = viewport.clientWidth - SAFE * 2;
      const availH = viewport.clientHeight - SAFE * 2;

      const rect = stage.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;

      const scale = Math.min(availW / rect.width, availH / rect.height, SCALE_MAX);
      stage.style.transform = `scale(${scale})`;

      const scaledW = rect.width * scale;
      const scaledH = rect.height * scale;

      const left = SAFE + Math.max(0, (availW - scaledW) / 2);
      const top  = SAFE + Math.max(0, (availH - scaledH) / 2);

      stage.style.position = "absolute";
      stage.style.left = `${Math.round(left)}px`;
      stage.style.top  = `${Math.round(top)}px`;
    }

    // Refit/normalize quand le contenu change de taille
    const ro = new ResizeObserver(() => {
      normalizeMainSvg();
      fitToViewport();
    });
    ro.observe(stage);

    window.addEventListener("resize", () => {
      normalizeMainSvg();
      fitToViewport();
    });

    // Plusieurs passes au chargement (Observable peut rendre en étapes)
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 150);
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 500);
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 1200);
  </script>
</body>
</html>
