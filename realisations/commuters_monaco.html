    const labels = data.map(d => d.rang);
    const values = data.map(d =>
      Number(String(d.part_frontaliers).replace(',', '.'))
    );
    let selectedIndex = null;

    const ctx = document.getElementById('barChart').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: "Share of commuters (%)",
          data: values,
          backgroundColor: "rgba(171, 68, 74, 0.6)",
          borderColor: "rgba(171, 68, 74, 1)",
          hoverBackgroundColor: "rgba(121, 14, 23, 0.9)",
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            max: 100,
            title: {
              display: true,
              text: "Share of commuters (%)"
            },
            ticks: {
              callback: value => value + " %"
            }
          },
          x: {
            title: {
              display: true,
              text: "Distance rank in Monaco"
            }
          }
        },
        onClick: handleClick
      }
    });

    function handleClick(evt, elements) {
      if (!elements.length) return;

      const index = elements[0].index;

      // Si on reclique sur la même barre → désélection
      if (selectedIndex === index) {
        selectedIndex = null;
      } else {
        selectedIndex = index;
      }

      // Met à jour les couleurs
      chart.data.datasets[0].backgroundColor = values.map((_, i) =>
        i === selectedIndex
          ? "rgba(121, 14, 23, 1)"   // couleur sélectionnée
          : "rgba(171, 68, 74, 0.6)" // couleur normale
      );

      chart.data.datasets[0].borderColor = values.map((_, i) =>
        i === selectedIndex
          ? "rgba(121, 14, 23, 1)"
          : "rgba(171, 68, 74, 1)"
      );

      chart.update();

      // Met à jour le panneau info
      if (selectedIndex !== null) {
        const d = data[selectedIndex];

        document.getElementById("info").innerHTML = `
          <strong>${d.commune}</strong><br>
          Distance to Monaco (straight-line) : ${d.distance_km} km<br>
          Total employment : ${d.emploi_total.toLocaleString()}<br>
          Number of commuters : ${d.frontaliers.toLocaleString()}<br>
          Share of commuters : <strong>${d.part_frontaliers} %</strong>
        `;
      } else {
        document.getElementById("info").innerHTML =
          "Cliquez sur une barre pour afficher les infos ici.";
      }
    }
