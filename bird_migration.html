<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Migrations d’oiseaux</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@observablehq/inspector@5/dist/inspector.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { overflow-y: auto; }

    .page { min-height: 100svh; }

    /* Zone du haut : fit uniquement ici */
    .viewport {
      position: relative;
      height: 100svh;
      overflow: hidden;
      padding: 18px 12px 12px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Bloc du haut (zoom/centré) */
    #map-stage {
      transform-origin: top left;
      will-change: transform;
    }

    .layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px 16px;
    }

    /* Bas : Fiche scrollable */
    .below {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 12px 28px;
    }

    /* CSS générique Observable */
    .observable-wrap { display: block; }
    .observable-wrap svg { max-width: 100%; height: auto; display: block; }

    .observable-wrap .observablehq,
    .observable-wrap .observablehq--inspect,
    .observable-wrap .observablehq--inspect > * {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    footer { display: none; }
  </style>
</head>

<body>
  <div class="page">

    <!-- HAUT : tout sauf Fiche -->
    <div class="viewport">
      <div id="map-stage">
        <div class="layout">
          <div id="obs-title" class="observable-wrap"></div>

          <div class="controls">
            <div id="obs-species" class="observable-wrap"></div>
            <div id="obs-birdsound" class="observable-wrap"></div>
          </div>

          <div id="obs-svg" class="observable-wrap"></div>
        </div>
      </div>
    </div>

    <!-- BAS : Fiche (scroll) -->
    <div class="below">
      <div id="obs-fiche" class="observable-wrap"></div>
    </div>

  </div>

  <script type="module">
    import { Runtime, Inspector } from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@5/dist/runtime.js";

    /* ==========
       CONFIG
       ========== */
    const NOTEBOOK = "715a3d46af17e30c";
    const VERSION  = null;        // mets un nombre si tu veux figer @xxx
    const SCALE_MAX = 0.99;
    const SAFE = 18;

    const mapStage = document.getElementById("map-stage");
    const viewport = document.querySelector(".viewport");

    // cellules affichées -> conteneurs stables
    const DISPLAY = {
      "titreMarkdown": document.getElementById("obs-title"),
      "viewof species": document.getElementById("obs-species"),
      "viewof birdSound": document.getElementById("obs-birdsound"),
      "svg": document.getElementById("obs-svg"),
      "Fiche": document.getElementById("obs-fiche")
    };

    // cellules à exécuter sans afficher (comme ton runtime)
    const EVALUATE_ONLY = new Set([
      "audioURL","trajectoiresFiltrees","wiki","sourcesMarkdown","bbox",
      "projectionZoom","paysTraverses","pathZoom"
    ]);

    const defineUrl = VERSION
      ? `https://api.observablehq.com/d/${NOTEBOOK}@${VERSION}.js?v=4`
      : `https://api.observablehq.com/d/${NOTEBOOK}.js?v=4`;

    const { default: define } = await import(defineUrl);

    const runtime = new Runtime();
    runtime.module(define, (name) => {
      if (name in DISPLAY) return new Inspector(DISPLAY[name]);
      if (EVALUATE_ONLY.has(name)) return true;
      return null;
    });

    // Normalise le SVG principal uniquement DANS le bloc du haut
    function normalizeMainSvg() {
      const svgs = mapStage.querySelectorAll("svg");
      if (!svgs.length) return;

      svgs.forEach(s => { s.style.width = ""; s.style.height = ""; });

      let main = null, maxArea = 0;
      svgs.forEach(s => {
        const b = s.getBoundingClientRect();
        const area = b.width * b.height;
        if (area > maxArea) { maxArea = area; main = s; }
      });

      if (main) {
        main.style.width = "100%";
        main.style.height = "auto";
        main.style.display = "block";
      }
    }

    // Fit basé UNIQUEMENT sur le bloc du haut -> la Fiche ne déclenche jamais de dézoom
    function fitToViewport() {
      mapStage.style.transform = "none";

      const availW = viewport.clientWidth  - SAFE * 2;
      const availH = viewport.clientHeight - SAFE * 2;

      const rect = mapStage.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;

      const scale = Math.min(availW / rect.width, availH / rect.height, SCALE_MAX);
      mapStage.style.transform = `scale(${scale})`;

      const scaledW = rect.width * scale;
      const scaledH = rect.height * scale;

      const left = SAFE + Math.max(0, (availW - scaledW) / 2);
      const top  = SAFE + Math.max(0, (availH - scaledH) / 2);

      mapStage.style.position = "absolute";
      mapStage.style.left = `${Math.round(left)}px`;
      mapStage.style.top  = `${Math.round(top)}px`;
    }

    const ro = new ResizeObserver(() => {
      normalizeMainSvg();
      fitToViewport();
    });
    ro.observe(mapStage);

    window.addEventListener("resize", () => {
      normalizeMainSvg();
      fitToViewport();
    });

    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 150);
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 500);
    setTimeout(() => { normalizeMainSvg(); fitToViewport(); }, 1200);
  </script>
</body>
</html>
